# Manual Retrain - Re-entrenamiento bajo demanda
# Labels y features se procesan incrementalmente en Daily Collect (2x/dia).
# Por defecto solo entrena + valida + scoring (~5 min).
# Activar labels/features solo si necesitas reprocesar todo desde cero.
name: Manual Retrain

on:
  workflow_dispatch:
    inputs:
      skip_labels:
        description: "Saltar re-etiquetado (Daily Collect ya lo hace incrementalmente)"
        required: false
        type: boolean
        default: true
      skip_features:
        description: "Saltar extraccion de features (Daily Collect ya lo hace incrementalmente)"
        required: false
        type: boolean
        default: true
      dry_run:
        description: "Solo mostrar estadisticas, no entrenar"
        required: false
        type: boolean
        default: false

concurrency:
  group: database-writes
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      STORAGE_BACKEND: supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/models .cache

      # Construir argumentos segun inputs del usuario
      # Captura la salida JSON del pipeline para extraer metricas
      - name: Run retrain pipeline
        id: retrain
        env:
          INPUT_SKIP_LABELS: ${{ inputs.skip_labels }}
          INPUT_SKIP_FEATURES: ${{ inputs.skip_features }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=""
          if [ "${INPUT_SKIP_LABELS}" = "true" ]; then
            ARGS="$ARGS --skip-labels"
          fi
          if [ "${INPUT_SKIP_FEATURES}" = "true" ]; then
            ARGS="$ARGS --skip-features"
          fi
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Ejecutando: python scripts/retrain_pipeline.py $ARGS"

          # Ejecutar pipeline y guardar la ultima linea (dict de stats) en archivo temporal
          python scripts/retrain_pipeline.py $ARGS 2>&1 | tee /dev/stderr | tail -1 > /tmp/retrain_output.txt

          # Extraer metricas del output usando python (lee del archivo para evitar problemas de escape)
          python3 << 'PYEOF'
          import ast, os

          with open("/tmp/retrain_output.txt") as f:
              raw = f.read().strip()

          # Limpiar prefijo 'Resultado: ' si existe
          if "Resultado: " in raw:
              raw = raw.split("Resultado: ", 1)[1]
          try:
              stats = ast.literal_eval(raw)
          except Exception:
              stats = {}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"model_version={stats.get('model_version', 'unknown')}\n")
              f.write(f"rf_val_f1={stats.get('rf_val_f1', 0.0)}\n")
              f.write(f"xgb_val_f1={stats.get('xgb_val_f1', 0.0)}\n")
              f.write(f"prev_rf_val_f1={stats.get('prev_rf_val_f1', '')}\n")
              f.write(f"prev_xgb_val_f1={stats.get('prev_xgb_val_f1', '')}\n")
              f.write(f"validation_passed={stats.get('validation_passed', '')}\n")
              f.write(f"rollback={stats.get('rollback', False)}\n")
              f.write(f"rollback_to={stats.get('rollback_to', '')}\n")
          PYEOF

      # Re-scoring de tokens con el nuevo modelo (solo si no hubo rollback)
      - name: Re-score tokens with new model
        if: steps.retrain.outcome == 'success' && steps.retrain.outputs.rollback != 'True' && inputs.dry_run != true
        run: python scripts/score_tokens.py --model random_forest --min-days 7
        timeout-minutes: 15

      # Subir artefactos del modelo (todos los archivos en data/models/)
      - name: Upload model artifacts
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_number }}
          path: data/models/
          retention-days: 30

      # Notificacion por Telegram con resultado de validacion (plain text, sin parse_mode)
      - name: Notify Telegram on success
        if: success()
        env:
          VERSION: ${{ steps.retrain.outputs.model_version }}
          RF_F1: ${{ steps.retrain.outputs.rf_val_f1 }}
          XGB_F1: ${{ steps.retrain.outputs.xgb_val_f1 }}
          PREV_RF: ${{ steps.retrain.outputs.prev_rf_val_f1 }}
          PREV_XGB: ${{ steps.retrain.outputs.prev_xgb_val_f1 }}
          ROLLBACK: ${{ steps.retrain.outputs.rollback }}
          ROLLBACK_TO: ${{ steps.retrain.outputs.rollback_to }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_SKIP_LABELS: ${{ inputs.skip_labels }}
          INPUT_SKIP_FEATURES: ${{ inputs.skip_features }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            MSG="🔍 Manual Retrain (DRY RUN) completado"
          elif [ "${ROLLBACK}" = "True" ]; then
            MSG="⚠️ ${VERSION} entrenado pero rollback a ${ROLLBACK_TO}"
            if [ -n "${PREV_RF}" ] && [ "${PREV_RF}" != "None" ]; then
              MSG="${MSG}%0ARF F1: ${PREV_RF} → ${RF_F1}"
              MSG="${MSG}%0AXGB F1: ${PREV_XGB} → ${XGB_F1}"
            fi
          else
            MSG="✅ ${VERSION} entrenado y validado"
            if [ -n "${PREV_RF}" ] && [ "${PREV_RF}" != "None" ]; then
              MSG="${MSG}%0ARF F1: ${PREV_RF} → ${RF_F1}"
              MSG="${MSG}%0AXGB F1: ${PREV_XGB} → ${XGB_F1}"
            else
              MSG="${MSG}%0ARF F1: ${RF_F1}, XGB F1: ${XGB_F1}"
            fi
          fi

          INPUTS="skip_labels=${INPUT_SKIP_LABELS}, skip_features=${INPUT_SKIP_FEATURES}, dry_run=${INPUT_DRY_RUN}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}%0A%0AInputs: ${INPUTS}%0A%0AVer run: ${RUN_URL}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          INPUT_SKIP_LABELS: ${{ inputs.skip_labels }}
          INPUT_SKIP_FEATURES: ${{ inputs.skip_features }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Manual Retrain FAILED%0A%0AInputs: skip_labels=${INPUT_SKIP_LABELS}, skip_features=${INPUT_SKIP_FEATURES}, dry_run=${INPUT_DRY_RUN}%0A%0AVer run: ${RUN_URL}"
