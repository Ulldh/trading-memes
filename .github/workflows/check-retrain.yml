# Check Retrain - Deteccion semanal de drift para decidir si re-entrenar
name: Check Retrain

on:
  schedule:
    # Lunes a las 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: database-writes
  cancel-in-progress: false

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      STORAGE_BACKEND: supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/models .cache

      # Ejecutar script de drift detection
      # El script escribe needs_retrain, reasons, overall_score, model_version
      # a GITHUB_OUTPUT antes de hacer sys.exit().
      # Exit codes: 0=OK, 1=retrain needed, 2=error.
      # continue-on-error permite que el job siga aunque exit code sea 1.
      - name: Run drift detection
        id: drift
        run: python scripts/check_drift.py --verbose
        continue-on-error: true

      # Disparar retrain automaticamente si se detecta drift (exit code 1)
      - name: Trigger retrain if needed
        if: steps.drift.outputs.needs_retrain == 'true'
        run: gh workflow run manual-retrain.yml
        env:
          GH_TOKEN: ${{ github.token }}

      # Notificacion por Telegram con resultado del check
      - name: Notify Telegram
        if: always()
        env:
          NEEDS_RETRAIN: ${{ steps.drift.outputs.needs_retrain }}
          SCORE: ${{ steps.drift.outputs.overall_score }}
          REASONS: ${{ steps.drift.outputs.reasons }}
          VERSION: ${{ steps.drift.outputs.model_version }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${NEEDS_RETRAIN}" = "true" ]; then
            EMOJI="⚠️"
            STATUS="RE-ENTRENAMIENTO RECOMENDADO"
          else
            EMOJI="✅"
            STATUS="Modelo OK, no necesita re-entrenamiento"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${EMOJI} *Drift Check*%0A%0A*Status:* ${STATUS}%0A*Modelo:* ${VERSION}%0A*Score:* ${SCORE}%0A*Razones:* ${REASONS}%0A%0A[Ver run](${RUN_URL})"
