# Recopilacion de datos 2x/dia - GeckoTerminal primario, Birdeye solo fallback/enrichment
# Birdeye Lite: 1.5M CU/mes, presupuesto 30K CU/dia. OHLCV via GeckoTerminal (gratis)
name: Daily Collect

on:
  schedule:
    # Cada 12 horas: 06:00 y 18:00 UTC
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      max_tokens_ohlcv:
        description: "Maximo de tokens para OHLCV (default 500)"
        required: false
        default: "500"

concurrency:
  group: database-writes
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      # Backend de almacenamiento
      STORAGE_BACKEND: supabase
      # Supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # API keys (nombres exactos de config.py)
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
      JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      # Limite de tokens para OHLCV update (default 500 — GeckoTerminal es gratis)
      MAX_TOKENS_OHLCV: ${{ inputs.max_tokens_ohlcv || '500' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/models .cache

      # El collector tiene __main__ que llama run_daily_collection() + collect_market_context()
      - name: Run daily collection
        run: python -m src.data.collector

      # Mostrar estadisticas de la DB despues de la recopilacion
      - name: Show DB stats
        run: |
          python -c "
          from src.data.supabase_storage import get_storage
          storage = get_storage()
          stats = storage.stats()
          print('=== DB Stats post-collect ===')
          for k, v in stats.items():
              print(f'  {k}: {v}')
          "

      # Extraer features para tokens que no los tienen
      # Procesa max 1000 por ejecucion (OHLCV cache acelera el calculo)
      - name: Extract features for new tokens
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.data.supabase_storage import get_storage
          from src.features.builder import FeatureBuilder
          storage = get_storage()
          # Get tokens without features
          tokens_with_features = set(storage.query('SELECT DISTINCT token_id FROM features')['token_id'].tolist())
          all_tokens = storage.query('SELECT token_id FROM tokens')['token_id'].tolist()
          missing = [t for t in all_tokens if t not in tokens_with_features]
          print(f'Tokens sin features: {len(missing)} de {len(all_tokens)}')
          if missing:
              builder = FeatureBuilder(storage)
              # Process max 1000 per run to stay within timeout
              batch = missing[:500]
              print(f'Procesando {len(batch)} tokens...')
              for i, token_id in enumerate(batch):
                  try:
                      features = builder.build_features_for_token(token_id)
                      if features:
                          import pandas as pd
                          df = pd.DataFrame([features])
                          storage.save_features_df(df)
                      if (i+1) % 50 == 0:
                          print(f'  {i+1}/{len(batch)} procesados')
                  except Exception as e:
                      print(f'  Error en {token_id}: {e}')
                      continue
              print(f'Features extraidos para {len(batch)} tokens')
          "
        timeout-minutes: 45

      # Etiquetar tokens INCREMENTALMENTE: solo los que no tienen label
      # Batch de 500 por run para evitar timeouts (antes procesaba ~6800)
      - name: Label tokens without labels
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.data.supabase_storage import get_storage
          from src.models.labeler import Labeler
          storage = get_storage()
          labeler = Labeler(storage)

          # Solo tokens que NO tienen labels todavia
          existing_labels = set()
          try:
              labels_df = storage.query('SELECT DISTINCT token_id FROM labels')
              if not labels_df.empty:
                  existing_labels = set(labels_df['token_id'].tolist())
          except Exception:
              pass

          all_tokens = storage.query('SELECT token_id FROM tokens')['token_id'].tolist()
          missing = [t for t in all_tokens if t not in existing_labels]
          print(f'Tokens sin labels: {len(missing)} de {len(all_tokens)} ({len(existing_labels)} ya etiquetados)')

          if not missing:
              print('Todos los tokens ya tienen labels, nada que hacer')
          else:
              # Batch de 500 por run (como features step)
              batch = missing[:500]
              print(f'Procesando batch de {len(batch)} tokens...')
              exitos = 0
              fallos = 0
              for i, token_id in enumerate(batch):
                  try:
                      resultado = labeler.label_token(token_id)
                      if resultado is not None:
                          exitos += 1
                      else:
                          fallos += 1
                  except Exception as e:
                      print(f'  Error en {token_id[:12]}...: {e}')
                      fallos += 1
                  if (i + 1) % 100 == 0:
                      print(f'  Progreso: {i + 1}/{len(batch)} ({exitos} exitos, {fallos} sin datos)')
              print(f'Labeling completado: {exitos} nuevos labels, {fallos} sin datos suficientes')
              print(f'Pendientes para proximo run: {len(missing) - len(batch)}')
          "
        timeout-minutes: 20

      # Birdeye backfill: tokens con <7 velas diarias no pueden ser etiquetados
      # por el labeler (necesita return_7d). Birdeye rellena el historial.
      # Procesa tokens de TODAS las cadenas con OHLCV insuficiente via Birdeye API.
      # max-tokens=100 para ahorrar CU Birdeye (presupuesto 30K CU/dia).
      # GeckoTerminal ahora es primario para OHLCV, Birdeye solo backfill.
      # BIRDEYE_API_KEY ya esta en env del job (linea 40).
      - name: Birdeye OHLCV backfill for tokens with few candles
        run: python scripts/backfill_ohlcv.py --max-tokens 100 --min-ohlcv 7 --chain all
        timeout-minutes: 30

      # Scoring de tokens con modelos ML
      # Descarga modelos de Supabase Storage si no estan localmente.
      # Si no hay modelos entrenados todavia, skip graceful (exit 0).
      - name: Score tokens with ML models
        run: python scripts/score_tokens.py --model random_forest --min-days 3

      # Notificacion por Telegram si falla
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Daily Collect FAILED*%0A%0ARepo: ${REPO}%0ARun: ${RUN_URL}"
