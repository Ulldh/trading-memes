services:
  - type: web
    name: trading-memes-dashboard
    runtime: docker
    repo: https://github.com/Ulldh/trading-memes
    branch: main
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: RENDER
        value: "true"
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID_ENTERPRISE
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
